<script id="vertexShader" type="x-shader/x-vertex">
    attribute float a_VertexID; // Pass vertex indices manually as a float
    varying vec2 v_position;
    void main() {
        if(a_VertexID<=2.5)  gl_Position = vec4(-1,3,0,1);
        if(a_VertexID<=1.5)  gl_Position = vec4(3,-1,0,1);
        if(a_VertexID<=0.5)  gl_Position = vec4(-1,-1,0,1);
        v_position = gl_Position.xy * 0.5 + 0.5;
    }
</script>
<script id="fragmentShaderToPolar" type="x-shader/x-fragment">
    #define PI 3.1415926536
    #ifdef GL_FRAGMENT_PRECISION_HIGH
    precision highp float;
    #else
    precision mediump float;
    #endif
    varying vec2 v_position;
    uniform vec2 u_texture_size;
    uniform vec2 u_canvas_size;
    uniform sampler2D u_texture;

    #define SAMPLES 2

    void main(void) {
        vec4 c = vec4(0);
        for(int i=0;i<SAMPLES;i++){
            float x = v_position.x + float(i)/float(SAMPLES)/u_canvas_size.x;
            vec2 polar = vec2(
                cos(x * 2.0 * PI),
                sin(x * 2.0 * PI)
            ) * (v_position.y * 0.5) * length(u_texture_size) / u_texture_size + 0.5;
            vec4 v = texture2D(u_texture, polar);
            c += v / float(SAMPLES);
        }
        gl_FragColor = c;
    }
</script>
<script id="fragmentShaderRender" type="x-shader/x-fragment">
    #define PI 3.1415926536
    #ifdef GL_FRAGMENT_PRECISION_HIGH
    precision highp float;
    #else
    precision mediump float;
    #endif
    varying vec2 v_position;
    uniform sampler2D u_prefix0;
    uniform sampler2D u_prefix1;
    uniform sampler2D u_prefix2;
    uniform sampler2D u_texture;
    uniform vec2 u_buffer_size;
    uniform vec2 u_texture_size;
    uniform vec2 u_canvas_size;

    uniform float u_angle;
    uniform float u_shutter;
    uniform float u_rolling;

    float srgb2linear(float c){
        // Simple
        // return pow(c, 2.2);
        // Rec. 709
        if(c<=0.04045) return c/12.92;
        return pow((c+0.055)/1.055, 2.4);
    }

    vec4 srgb2linear(vec4 c){
        return vec4(
            srgb2linear(c.r),
            srgb2linear(c.g),
            srgb2linear(c.b),
            c.a
        );
    }

    float linear2srgb(float c){
        // return pow(c, 1.0/2.2);
        if(c<=0.0031308) return c*12.92;
        return 1.055*pow(c, 1.0/2.4) - 0.055;
    }

    vec4 linear2srgb(vec4 c){
        return vec4(
            linear2srgb(c.r),
            linear2srgb(c.g),
            linear2srgb(c.b),
            c.a
        );
    }


    vec4 integral2(float x1, float x2, float y, float norm){
        float halfx = 0.5/u_buffer_size.x;
        float halfy = 0.5/u_buffer_size.y;
        vec4 prefix0_1 = texture2D(u_prefix0, vec2(x1-halfx, y+halfy));
        vec4 prefix1_1 = texture2D(u_prefix1, vec2(x1-halfx, y+halfy));
        vec4 prefix2_1 = texture2D(u_prefix2, vec2(x1-halfx, y+halfy));

        float px1 = x1*u_buffer_size.x;
        if(px1<1.0){
            prefix0_1 *= px1;
            prefix1_1 *= px1;
            prefix2_1 *= px1;
        }

        vec4 prefix0_2 = texture2D(u_prefix0, vec2(x2-halfx, y+halfy));
        vec4 prefix1_2 = texture2D(u_prefix1, vec2(x2-halfx, y+halfy));
        vec4 prefix2_2 = texture2D(u_prefix2, vec2(x2-halfx, y+halfy));

        float px2 = x2*u_buffer_size.x;
        if(px2<1.0){
            prefix0_2 *= px2;
            prefix1_2 *= px2;
            prefix2_2 *= px2;
        }

        vec4 diff0 = vec4(prefix0_2 - prefix0_1);
        vec4 diff1 = vec4(prefix1_2 - prefix1_1);
        vec4 diff2 = vec4(prefix2_2 - prefix2_1);
        vec4 diff = (diff2*64.0 + diff1)*64.0+diff0;

        return diff / norm;

    }

    vec4 integral(vec2 p, float l){
        p.x = fract(p.x);
        float norm = l * u_buffer_size.x;
        vec4 accum = vec4(0);
       
        float laps = floor(l);
        float f = fract(l);
        float x0 = p.x-f;
        float fx0 = fract(x0);
        accum += integral2(fx0, p.x, p.y, norm);
        if(fx0>x0) laps+=1.0;
        accum += laps * integral2(0.0, 2.0, p.y, norm);
        return accum;
    }

    #define SAMPLES 8

    void main(void) {
        vec2 uv = (v_position - 0.5) / length(u_canvas_size) * u_canvas_size * 2.0;
        vec2 p = vec2(
            fract(atan(uv.y, uv.x)/PI*0.5 + u_angle + u_rolling * uv.y),
            length(uv)
        );

        // sampling without shutter when shutter is small.

        vec4 c0 = vec4(0);
        for(int i=0;i<SAMPLES;i++){
            float x = p.x - float(i)/float(SAMPLES) * u_shutter;
            vec2 polar = vec2(
                cos(x * 2.0 * PI),
                sin(x * 2.0 * PI)
            ) * (p.y * 0.5) * length(u_texture_size) / u_texture_size + 0.5;
            vec4 v = texture2D(u_texture, polar);
            c0 += srgb2linear(v) / float(SAMPLES);
        }

        // Debug: Red is blended with sampling.
        // c0.r=1.0;
        
        
        vec4 c = integral(p, max(u_shutter, 1.5/u_buffer_size.x));
        c = mix(c0, c, smoothstep(0.0, 1.0, u_buffer_size.x * u_shutter / 3.0 - 1.0));

        c = linear2srgb(c);

        gl_FragColor = vec4(c);

    }
</script>
<script>
    // ==========================================
    // === 1. STATE & DOM ELEMENTS
    // ==========================================
    const fileInput = document.getElementById('file')
    const presetSelect = document.getElementById('presetSelect')
    const debugControls = document.getElementById('debugControls')
    const showGrid = document.getElementById('showGrid')
    const canvas = document.getElementById('canvas')
    const overlayCanvas = document.getElementById('overlayCanvas')
    canvas.width = 512;
    canvas.height = 512;
    /**@type {WebGLRenderingContext}*/
    const gl = canvas.getContext('webgl')

    let program2 = null;
    let prefixTextures = null;
    let texture = null;
    let offscreenTexture = null;
    let programBlit = null;
    let u_blitTextureLocation = null;
    let debugUnlocked = false;
    let activeSATOverlay = -1; // -1 = offscreenTexture, 0/1/2 = u_prefix0/1/2
    let paramShowGrid = false;
    let currentAngle = 0;
    let currentShutter = 0;
    let currentRolling = 0;
    let hoverCoords = null;

    let analyserOsc = null;
    let analyserNoise = null;
    let analyserRes = null;
    let analyserCombined = null;

    const historyLength = 22050; // 0.5s at 44100Hz
    let historyOsc = new Float32Array(historyLength);
    let historyNoise = new Float32Array(historyLength);
    let historyRes = new Float32Array(historyLength);
    let historyCombined = new Float32Array(historyLength);

    // Lightweight 5-line Blit Fragment Shader Source
    const fragmentShaderBlitSource = `
        precision mediump float;
        varying vec2 v_position;
        uniform sampler2D u_texture;
        void main() {
            gl_FragColor = texture2D(u_texture, v_position);
        }
    `;

    // Set Image and call main().
    let targetImg = document.createElement('img')
    targetImg.src = './sample.png'

    // Image file input.
    function fileToImage(file) {
        const img = new Image()
        img.src = URL.createObjectURL(file)
        return img
    }

    fileInput.addEventListener('change', function (e) {
        if (e.target.files) {
            targetImg = fileToImage(e.target.files[0])
            main()
        }
    })

    presetSelect.addEventListener('change', function (e) {
        if (e.target.value !== 'custom') {
            const img = new Image()
            img.src = e.target.value
            presetSelect.value = 'custom'
            targetImg = img
            main()
        }
    })

    // Handle clipboard paste.
    window.addEventListener('paste', function (e) {
        const items = (e.clipboardData || window.clipboardData).items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                const blob = items[i].getAsFile();
                targetImg = fileToImage(blob);
                presetSelect.value = 'custom';
                main();
                break;
            }
        }
    });

    // Handle drag and drop.
    window.addEventListener('dragover', function (e) {
        e.preventDefault();
    });
    window.addEventListener('drop', function (e) {
        e.preventDefault();
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            const file = e.dataTransfer.files[0];
            if (file.type.indexOf('image') !== -1) {
                targetImg = fileToImage(file);
                presetSelect.value = 'custom';
                main();
            }
        }
    });

    // ==========================================
    // === 2. WEBGL SETUP & UTILS
    // ==========================================
    async function imageReady(img) {
        if (img.complete) return img
        return new Promise(done => img.addEventListener('load', _ => done(img)))
    }

    function imageToTexture(img) {
        const texture = gl.createTexture()
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
        gl.pixelStorei(gl.UNPACK_COLORSPACE_CONVERSION_WEBGL, false);
        gl.bindTexture(gl.TEXTURE_2D, texture)
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE)
        return texture
    }

    // Shader helper functions.

    function loadShaderFromSource(type, source) {
        const shader = gl.createShader(type)
        gl.shaderSource(shader, source)
        gl.compileShader(shader)
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.log(gl.getShaderInfoLog(shader))
            gl.deleteShader(shader)
            return null
        }
        return shader
    }

    function loadShaderFromId(type, id) {
        const source = document.getElementById(id).textContent
        return loadShaderFromSource(type, source)
    }


    function createShaderProgram(vertId, fragId) {
        const program = gl.createProgram()
        gl.attachShader(program, loadShaderFromId(gl.VERTEX_SHADER, vertId))
        gl.attachShader(program, loadShaderFromId(gl.FRAGMENT_SHADER, fragId))
        gl.linkProgram(program)
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.log(gl.getProgramInfoLog(program))
            gl.deleteProgram(program)
            return null
        }
        return program
    }

    // Main.
    async function setupTargetTexture() {
        await imageReady(targetImg)
        const texture = imageToTexture(targetImg)
        const imageScale = 900 / Math.max(targetImg.naturalWidth, targetImg.naturalHeight)
        canvas.width = Math.round(targetImg.naturalWidth * imageScale)
        canvas.height = Math.round(targetImg.naturalHeight * imageScale)
        return texture
    }

    function bindIdBuffer(program) {
        // Bind Buffer.
        const idBuffer = gl.createBuffer()
        gl.bindBuffer(gl.ARRAY_BUFFER, idBuffer)
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0.0, 1.0, 2.0]), gl.STATIC_DRAW)
        const a_VertexID = gl.getAttribLocation(program, "a_VertexID")
        gl.enableVertexAttribArray(a_VertexID)
        gl.vertexAttribPointer(
            /*index=*/a_VertexID,  /*size=*/1, /*type=*/gl.FLOAT,
            /*normalized=*/false, /*stride=*/0, /*offset=*/0
        )
    }

    function bindFrameBuffer(bufferWidth, bufferHeight) {
        const fb = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fb); // Corrected target
        offscreenTexture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, offscreenTexture);
        gl.texImage2D(
            gl.TEXTURE_2D, 0, gl.RGBA, bufferWidth, bufferHeight,
            0, gl.RGBA, gl.UNSIGNED_BYTE, null
        );
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.framebufferTexture2D(
            gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, offscreenTexture, 0
        );
        gl.bindTexture(gl.TEXTURE_2D, null);
    }

    function bindTexture(program, name, texture, i = 0) {

        if (c <= 0.04045) return c / 12.92;
        return Math.pow((c + 0.055) / 1.055, 2.4);

            densityProfile[x] = sum;
            sumD += sum;
            if (sum < minD) minD = sum;
            if (sum > maxD) maxD = sum;

    // Helper to calculate mouse coordinates inside letterboxed canvas
    function getRelativeMouseCoords(e) {
        const rect = overlayCanvas.getBoundingClientRect();
        const containerAspect = rect.width / rect.height;
        const canvasAspect = overlayCanvas.width / overlayCanvas.height;
        
        let activeWidth, activeHeight, offsetX, offsetY;
        if (containerAspect > canvasAspect) {
            activeHeight = rect.height;
            activeWidth = activeHeight * canvasAspect;
            offsetX = (rect.width - activeWidth) / 2;
            offsetY = 0;
        } else {
            activeWidth = rect.width;
            activeHeight = activeWidth / canvasAspect;
            offsetX = 0;
            offsetY = (rect.height - activeHeight) / 2;
        }
        
        const clientX = e.clientX - rect.left - offsetX;
        const clientY = e.clientY - rect.top - offsetY;
        
        const x = (clientX / activeWidth) * overlayCanvas.width;
        const y = (clientY / activeHeight) * overlayCanvas.height;
        
        return {
            x,
            y,
            inside: x >= 0 && x <= overlayCanvas.width && y >= 0 && y <= overlayCanvas.height
        };
    }

                px = ((rawAngle + currentAngle + currentRolling * activeInspection.lockedY) % 1.0 + 1.0) % 1.0;
            } else if (activeInspection.source === 'C') {
                const theta_original = Math.atan2(activeInspection.lockedY, activeInspection.lockedX);
                const rawAngle = (theta_original / (2 * Math.PI) % 1.0 + 1.0) % 1.0;
                px = (rawAngle + currentAngle) % 1.0;
            }
            
            // --- DRAW ON PANEL A (Active Cartesian Dynamic) ---
            let startPointA = null;
            let endPointA = null;
            
            if (activeInspection.source === 'A') {
                // Rendered screen point is stationary: draw single fixed target dot and crosshair on Panel A
                let cxSize = w / 2;
                let cySize = h / 2;
                const lenCanvas = Math.sqrt(cxSize * cxSize + cySize * cySize);
                
                const sVx = activeInspection.lockedX * lenCanvas / (cxSize * 2.0) + 0.5;
                const sVy = activeInspection.lockedY * lenCanvas / (cySize * 2.0) + 0.5;
                
                let drawX = sVx * cxSize;
                let drawY = h / 2 - sVy * cySize;
                
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath(); ctx.arc(drawX, drawY, 5, 0, 2 * Math.PI); ctx.fill();
                
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(drawX - 8, drawY); ctx.lineTo(drawX + 8, drawY);
                ctx.moveTo(drawX, drawY - 8); ctx.lineTo(drawX, drawY + 8);
                ctx.stroke();
            } else {
                // Clicked bottom left: draw dynamic scatter sweep of where the stationary original pixel goes
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                
                const theta_original = Math.atan2(activeInspection.lockedY, activeInspection.lockedX);
                const samplePxBase = (theta_original / (2 * Math.PI) % 1.0 + 1.0) % 1.0;
                
                for (let i = 0; i <= SAMPLES; i++) {
                    const x_exposed = samplePxBase + (i / SAMPLES) * shutterVal;
                    const theta = getScreenAngle(x_exposed, py, currentAngle, currentRolling);
                    
                    const uvX = py * Math.cos(theta);
                    const uvY = py * Math.sin(theta);
                    
                    let cxSize = w / 2;
                    let cySize = h / 2;
                    const lenCanvas = Math.sqrt(cxSize * cxSize + cySize * cySize);
                    
                    const sVx = uvX * lenCanvas / (cxSize * 2.0) + 0.5;
                    const sVy = uvY * lenCanvas / (cySize * 2.0) + 0.5;
                    
                    let drawX = sVx * cxSize;
                    let drawY = h / 2 - sVy * cySize;
                    
                    if (i === 0) {
                        ctx.moveTo(drawX, drawY);
                        endPointA = { x: drawX, y: drawY };
                    } else {
                        ctx.lineTo(drawX, drawY);
                    }
                    
                    if (i === SAMPLES) {
                        startPointA = { x: drawX, y: drawY };
                    }
                }
                ctx.stroke();
                
                if (startPointA && endPointA) {
                    ctx.fillStyle = '#ff3366';
                    ctx.beginPath(); ctx.arc(startPointA.x, startPointA.y, 4, 0, 2 * Math.PI); ctx.fill();
                    
                    ctx.fillStyle = '#33ccff';
                    ctx.beginPath(); ctx.arc(endPointA.x, endPointA.y, 4, 0, 2 * Math.PI); ctx.fill();
                }
            }
            
            // --- DRAW ON PANEL C (Stationary Cartesian Baseline) ---
            let startPointC = null;
            let endPointC = null;
            
            if (activeInspection.source === 'C') {
                // Static original pixel is stationary: draw single fixed target dot and crosshair on Panel C
                let cxSize = w / 2;
                let cySize = h / 2;
                const lenCanvas = Math.sqrt(cxSize * cxSize + cySize * cySize);
                
                const sVx = activeInspection.lockedX * lenCanvas / (cxSize * 2.0) + 0.5;
                const sVy = activeInspection.lockedY * lenCanvas / (cySize * 2.0) + 0.5;
                
                let drawX = sVx * cxSize;
                let drawY = h - sVy * cySize;
                
                ctx.fillStyle = '#ff3366';
                ctx.beginPath(); ctx.arc(drawX, drawY, 5, 0, 2 * Math.PI); ctx.fill();
                
                ctx.strokeStyle = '#ff3366';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(drawX - 8, drawY); ctx.lineTo(drawX + 8, drawY);
                ctx.moveTo(drawX, drawY - 8); ctx.lineTo(drawX, drawY + 8);
                ctx.stroke();
            } else {
                // Clicked top left: draw arc of original pixels contributing to that screen pixel
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                
                const theta_screen = Math.atan2(activeInspection.lockedY, activeInspection.lockedX);
                
                for (let i = 0; i <= SAMPLES; i++) {
                    const theta_original = theta_screen + 2 * Math.PI * (currentAngle + currentRolling * activeInspection.lockedY - (i / SAMPLES) * shutterVal);
                    
                    const uvX = py * Math.cos(theta_original);
                    const uvY = py * Math.sin(theta_original);
                    
                    let cxSize = w / 2;
                    let cySize = h / 2;
                    const lenCanvas = Math.sqrt(cxSize * cxSize + cySize * cySize);
                    
                    const sVx = uvX * lenCanvas / (cxSize * 2.0) + 0.5;
                    const sVy = uvY * lenCanvas / (cySize * 2.0) + 0.5;
                    
                    let drawX = sVx * cxSize;
                    let drawY = h - sVy * cySize;
                    
                    if (i === 0) {
                        ctx.moveTo(drawX, drawY);
                        endPointC = { x: drawX, y: drawY };
                    } else {
                        ctx.lineTo(drawX, drawY);
                    }
                    
                    if (i === SAMPLES) {
                        startPointC = { x: drawX, y: drawY };
                    }
                }
                ctx.stroke();
                
                if (startPointC && endPointC) {
                    ctx.fillStyle = '#ff3366';
                    ctx.beginPath(); ctx.arc(startPointC.x, startPointC.y, 4, 0, 2 * Math.PI); ctx.fill();
                    
                    ctx.fillStyle = '#33ccff';
                    ctx.beginPath(); ctx.arc(endPointC.x, endPointC.y, 4, 0, 2 * Math.PI); ctx.fill();
                }
            }
            
            // --- DRAW ON PANEL B (Multi-band Highlights) ---
            const bStartX = w / 2;
            const bEndX = w;
            const bandHeight = h / 8;
            
            const px1 = px - shutterVal;
            const px2 = px;
            const x1 = bStartX + (px1 % 1.0 + 1.0) % 1.0 * (bEndX - bStartX);
            const x2 = bStartX + (px2 % 1.0 + 1.0) % 1.0 * (bEndX - bStartX);
            
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            
            for (let b = 0; b < 4; b++) {
                const polarY = b * bandHeight + bandHeight * (1.0 - py);
                ctx.beginPath();
                if (x1 <= x2) {
                    ctx.moveTo(x1, polarY);
                    ctx.lineTo(x2, polarY);
                } else {
                    ctx.moveTo(x1, polarY);
                    ctx.lineTo(bEndX, polarY);
                    ctx.moveTo(bStartX, polarY);
                    ctx.lineTo(x2, polarY);
                }
                ctx.stroke();
                
                ctx.fillStyle = '#ff3366';
                ctx.beginPath(); ctx.arc(x1, polarY, 3.5, 0, 2 * Math.PI); ctx.fill();
                
                ctx.fillStyle = '#33ccff';
                ctx.beginPath(); ctx.arc(x2, polarY, 3.5, 0, 2 * Math.PI); ctx.fill();
            }
            
            // --- PROJECT TIMING DOWN INTO PANEL D ---
            const xWave = startX + (px % 1.0) * (w / 2);
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(xWave, h / 2);
            ctx.lineTo(xWave, h);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '10px monospace';
            ctx.fillText(`\u03b8: ${px.toFixed(3)} r: ${py.toFixed(3)}`, w / 2 + 15, h / 2 - 10);
        }
    }

        }
        const stream = new MediaStream(tracks);

        let options = {

        };
        let mimeType = 'video/webm;codecs=vp9,opus';

    // ==========================================
    // === 4. AUDIO ENGINE
    // ==========================================
    let audioCtx = null;
    let mainOsc = null;
    let noiseSrc = null;
    let noiseFilter = null;
    let oscGain = null;
    let rattleFilter = null;
    let rattleGain = null;
    let noiseGain = null;
    let masterGain = null;
    let globalWaveData = null;
    let suspendTimeout = null;

    function suspendAudioGracefully() {
        if (!audioCtx || audioCtx.state !== 'running') return;

        if (suspendTimeout) {
            clearTimeout(suspendTimeout);
        }

        const now = audioCtx.currentTime;
        masterGain.gain.cancelScheduledValues(now);
        masterGain.gain.setValueAtTime(masterGain.gain.value, now);
        masterGain.gain.linearRampToValueAtTime(0, now + 0.1);

        suspendTimeout = setTimeout(() => {
            if (!isStarted && audioCtx && audioCtx.state === 'running') {
                audioCtx.suspend();
            }
            suspendTimeout = null;
        }, 150);
    }

    function resumeAudioGracefully() {
        if (suspendTimeout) {
            clearTimeout(suspendTimeout);
            suspendTimeout = null;
        }

        initAudio();
        if (!audioCtx) return;

        if (audioCtx.state === 'suspended') {
            const now = audioCtx.currentTime;
            masterGain.gain.cancelScheduledValues(now);
            masterGain.gain.setValueAtTime(0, now);
            audioCtx.resume();
        }
    }

    function updateAudioBuffer() {
        if (!audioCtx || !globalWaveData) return;
        const buffer = audioCtx.createBuffer(1, globalWaveData.length, audioCtx.sampleRate);
        buffer.copyToChannel(globalWaveData, 0);

        const now = audioCtx.currentTime;

        if (mainOsc) {
            const oldOsc = mainOsc;
            const oldFade = mainOsc.fadeNode;
            if (oldFade) {
                oldFade.gain.cancelScheduledValues(now);
                oldFade.gain.setValueAtTime(oldFade.gain.value, now);
                oldFade.gain.linearRampToValueAtTime(0, now + 0.05);
                setTimeout(() => {
                    oldOsc.stop();
                    oldOsc.disconnect();
                    oldFade.disconnect();
                }, 100);
            } else {
                oldOsc.stop();
                oldOsc.disconnect();
            }
        }

        mainOsc = audioCtx.createBufferSource();
        mainOsc.buffer = buffer;
        mainOsc.loop = true;

        const fadeNode = audioCtx.createGain();
        fadeNode.gain.setValueAtTime(0, now);
        fadeNode.gain.linearRampToValueAtTime(1, now + 0.05);
        mainOsc.fadeNode = fadeNode;

        mainOsc.connect(fadeNode);
        fadeNode.connect(oscGain);
        fadeNode.connect(rattleFilter);

        let rpm = Math.abs(deltaAngle * 60);
        let baseFreq = Math.max(rpm / 60, 0.5);
        let rate = baseFreq * (globalWaveData.length / audioCtx.sampleRate);
        mainOsc.playbackRate.value = rate;

        mainOsc.start(now);
    }

    function initAudio() {
        if (audioCtx) return;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        analyserOsc = audioCtx.createAnalyser();
        analyserNoise = audioCtx.createAnalyser();
        analyserRes = audioCtx.createAnalyser();
        analyserCombined = audioCtx.createAnalyser();
        
        analyserOsc.fftSize = 2048;
        analyserNoise.fftSize = 2048;
        analyserRes.fftSize = 2048;
        analyserCombined.fftSize = 2048;

        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(analyserCombined);
        analyserCombined.connect(audioCtx.destination);

        // Direct continuous hum path
        oscGain = audioCtx.createGain();
        oscGain.gain.value = 0.0;
        oscGain.connect(analyserOsc);
        analyserOsc.connect(masterGain);

        // Mechanical Rattle Resonance Path
        rattleFilter = audioCtx.createBiquadFilter();
        rattleFilter.type = 'bandpass';
        rattleFilter.frequency.value = 250;
        rattleFilter.Q.value = 10.0;

        rattleGain = audioCtx.createGain();
        rattleGain.gain.value = 0.0;
        rattleFilter.connect(rattleGain);
        rattleGain.connect(analyserRes);
        analyserRes.connect(masterGain);

        updateAudioBuffer();

        // Wind/Air Noise
        const bufferSize = audioCtx.sampleRate * 2;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

        noiseSrc = audioCtx.createBufferSource();
        noiseSrc.buffer = noiseBuffer;
        noiseSrc.loop = true;

        noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'lowpass';
        noiseFilter.frequency.value = 50;
        noiseFilter.Q.value = 1.0;

        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.0;

        noiseSrc.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(analyserNoise);
        analyserNoise.connect(masterGain);
        noiseSrc.start();
    }

    // ==========================================
    // === 5. ANIMATION LOOP
    // ==========================================
    let deltaTime = 0
    function update() {
        requestAnimationFrame(update);
        let time = Date.now();

        if (isStarted) {
            deltaTime = (time - prevTime) / 1000;

            let targetFPS = fpsSelect.value;
            if (targetFPS !== "unlimited") {
                let targetFrameTime = 1 / parseFloat(targetFPS);
                if (deltaTime < targetFrameTime) {
                    return;
                }
            }
        }

        prevTime = time;

        // Set uniform.

        let maxrps = paramMaxrpm / 60

        if (isStarted) {
            if (paramAccel > 0 && deltaAngle > maxrps - 0.01) {
                deltaAngle += (maxrps - deltaAngle) * Math.min(1.0, 2.0 * deltaTime)
            }
            else if (paramAccel < 0 && deltaAngle < -maxrps + 0.01) {
                deltaAngle += (-maxrps - deltaAngle) * Math.min(1.0, 2.0 * deltaTime)
            } else {
                deltaAngle += paramAccel * deltaTime

            }
            angle += deltaAngle * deltaTime
        }

        // let correctionAngle = (angle + 0.5) % 1 - 0.5
        // deltaAngle += -correctionAngle  * deltaTime

        let rpm = Math.abs(deltaAngle * 60);
        info.textContent = "RPM: " + rpm.toFixed(0).padStart(5, " ")

        if (audioCtx && mainOsc) {
            let baseFreq = Math.max(rpm / 60, 0.5);
            let rate = baseFreq * (globalWaveData.length / audioCtx.sampleRate);
            mainOsc.playbackRate.setTargetAtTime(rate, audioCtx.currentTime, 0.1);

            let filterFreq = Math.min(100 + rpm * 1.5, 10000);
            noiseFilter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.1);

            let rVol = Math.max(paramRollingMult * 0.2, 1.0 - (rpm / 1000)) * 10.0;
            let oscVol = Math.min(rpm / 1000, 1.0) * 0.6;
            let noiseVol = Math.min(rpm / 1000, 1.0) * (1.1 - paramShutterMult) * 0.05;

            rattleGain.gain.setTargetAtTime(rVol, audioCtx.currentTime, 0.1);
            oscGain.gain.setTargetAtTime(oscVol, audioCtx.currentTime, 0.1);
            noiseGain.gain.setTargetAtTime(noiseVol, audioCtx.currentTime, 0.1);

            let targetGain = Math.min(rpm / 1000, 1.0) * 0.3;
            if (rpm < 1 || isMuted || !isStarted) targetGain = 0;
            masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.1);
        }

        // Capture live Web Audio sample data slice for real-time visual history tracking (0.5s continuous rolling window)
        if (audioCtx && isStarted && !isMuted && analyserOsc) {
            let tempOsc = new Float32Array(1024);
            let tempNoise = new Float32Array(1024);
            let tempRes = new Float32Array(1024);
            let tempCombined = new Float32Array(1024);
            
            analyserOsc.getFloatTimeDomainData(tempOsc);
            analyserNoise.getFloatTimeDomainData(tempNoise);
            analyserRes.getFloatTimeDomainData(tempRes);
            analyserCombined.getFloatTimeDomainData(tempCombined);
            
            // At 60 FPS, shifting by 735 samples corresponds perfectly to a continuous ~16.6ms rolling timeline
            const shiftAmount = 735;
            historyOsc.copyWithin(0, shiftAmount);
            historyOsc.set(tempOsc.subarray(0, shiftAmount), historyLength - shiftAmount);
            
            historyNoise.copyWithin(0, shiftAmount);
            historyNoise.set(tempNoise.subarray(0, shiftAmount), historyLength - shiftAmount);
            
            historyRes.copyWithin(0, shiftAmount);
            historyRes.set(tempRes.subarray(0, shiftAmount), historyLength - shiftAmount);
            
            historyCombined.copyWithin(0, shiftAmount);
            historyCombined.set(tempCombined.subarray(0, shiftAmount), historyLength - shiftAmount);
        }


        // Render.
        let shutter = deltaAngle * deltaTime * paramShutterMult
        let rolling = -deltaAngle * deltaTime * paramRollingMult
        
        currentAngle = angle;
        currentShutter = shutter;
        currentRolling = rolling;

        // Synchronize overlay canvas dimension
        if (overlayCanvas.width !== canvas.width || overlayCanvas.height !== canvas.height) {
            overlayCanvas.width = canvas.width;
            overlayCanvas.height = canvas.height;
        }

        gl.clearColor(0.0, 0.0, 0.0, 0.0)
        gl.clearDepth(1.0)
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT)

        if (!debugUnlocked) {
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.useProgram(program2)
            
            // Re-bind textures for program2
            for (let i = 0; i < 3; i++) {
                bindTexture(program2, "u_prefix" + i, prefixTextures[i], i)
            }
            bindTexture(program2, "u_texture", texture, 3)

            gl.uniform2f(gl.getUniformLocation(program2, "u_canvas_size"), canvas.width, canvas.height)
            if (shutter > 0) {
                gl.uniform1f(u_angle, angle)
            } else {
                gl.uniform1f(u_angle, angle - shutter)
            }
            gl.uniform1f(u_shutter, Math.abs(shutter))
            gl.uniform1f(u_rolling, rolling)
            gl.drawArrays(gl.TRIANGLES, /*offset=*/0, /*vertexCount=*/3)
        } else {
            // [Panel A - Top Left Cartesian Dynamic Motion-Blurred Circle]
            gl.viewport(0, canvas.height / 2, canvas.width / 2, canvas.height / 2);
            gl.useProgram(program2)
            
            // Re-bind textures for program2
            for (let i = 0; i < 3; i++) {
                bindTexture(program2, "u_prefix" + i, prefixTextures[i], i)
            }
            bindTexture(program2, "u_texture", texture, 3)

            // Pass perfect symmetric (canvas.width / 2, canvas.height / 2) to u_canvas_size so no content gets clipped or squished!
            gl.uniform2f(gl.getUniformLocation(program2, "u_canvas_size"), canvas.width / 2, canvas.height / 2)
            if (shutter > 0) {
                gl.uniform1f(u_angle, angle)
            } else {
                gl.uniform1f(u_angle, angle - shutter)
            }
            gl.uniform1f(u_shutter, Math.abs(shutter))
            gl.uniform1f(u_rolling, rolling)
            gl.drawArrays(gl.TRIANGLES, /*offset=*/0, /*vertexCount=*/3)

            // [Panel B - Top Right Polar Precomputed Table Buffer SQUEEZED into 4 parallel bands]
            gl.useProgram(programBlit)
            bindIdBuffer(programBlit)
            gl.activeTexture(gl.TEXTURE0)
            
            const wHalf = canvas.width / 2;
            const hHalf = canvas.height / 2;
            const bandH = canvas.height / 8; // Each of the 4 bands is h/8 in height
            
            // Band 1 (Top): Unrolled Polar Expanded Buffer
            gl.viewport(wHalf, hHalf + 3 * bandH, wHalf, bandH);
            gl.bindTexture(gl.TEXTURE_2D, offscreenTexture)
            gl.uniform1i(u_blitTextureLocation, 0)
            gl.drawArrays(gl.TRIANGLES, 0, 3)
            
            // Band 2: Prefix SAT Buffer 0 (Low)
            gl.viewport(wHalf, hHalf + 2 * bandH, wHalf, bandH);
            gl.bindTexture(gl.TEXTURE_2D, prefixTextures[0])
            gl.uniform1i(u_blitTextureLocation, 0)
            gl.drawArrays(gl.TRIANGLES, 0, 3)
            
            // Band 3: Prefix SAT Buffer 1 (Mid)
            gl.viewport(wHalf, hHalf + 1 * bandH, wHalf, bandH);
            gl.bindTexture(gl.TEXTURE_2D, prefixTextures[1])
            gl.uniform1i(u_blitTextureLocation, 0)
            gl.drawArrays(gl.TRIANGLES, 0, 3)
            
            // Band 4: Prefix SAT Buffer 2 (High)
            gl.viewport(wHalf, hHalf + 0 * bandH, wHalf, bandH);
            gl.bindTexture(gl.TEXTURE_2D, prefixTextures[2])
            gl.uniform1i(u_blitTextureLocation, 0)
            gl.drawArrays(gl.TRIANGLES, 0, 3)

            // [Panel C - Bottom Left Cartesian Static Circle (No Effect)]
            gl.viewport(0, 0, canvas.width / 2, canvas.height / 2);
            gl.useProgram(program2)
            
            // Re-bind textures for program2
            for (let i = 0; i < 3; i++) {
                bindTexture(program2, "u_prefix" + i, prefixTextures[i], i)
            }
            bindTexture(program2, "u_texture", texture, 3)

            // Pass perfect symmetric (canvas.width / 2, canvas.height / 2) to u_canvas_size
            gl.uniform2f(gl.getUniformLocation(program2, "u_canvas_size"), canvas.width / 2, canvas.height / 2)
            // SET SHUTTER, ROLLING AND ANGLE TO ZERO FOR THE STATIC OPTICAL VIEW!
            gl.uniform1f(u_angle, 0.0)
            gl.uniform1f(u_shutter, 0.0)
            gl.uniform1f(u_rolling, 0.0)
            gl.drawArrays(gl.TRIANGLES, /*offset=*/0, /*vertexCount=*/3)

            // [Panel D - Bottom Right Waveform Plot]: left unrendered by WebGL
        }

        // Draw 2D Vector Overlay
        drawOverlay();

    }


    main()

    update()
