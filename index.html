<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin!</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta property="og:title" content="Spin!">
    <meta property="og:description" content="A mesmerizing, physically-based spin simulation with realistic audio">
    <meta property="og:image" content="/og-image.png">
    <meta property="og:type" content="website">

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            transition: background-color 0.5s ease;
            display: flex;
            justify-content: center;
            height: 100dvh; /* dynamic viewport handles mobile address bars perfectly */
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
            color: #fff;
            background-color: #222;
        }

        .container {
            margin: auto;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 0;
            min-height: 0;
            height: 100%;
        }

        canvas {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Buttons */
        .custom-file-upload, #resetBtn {
            width: 100%;
            padding: 0.8em;
            border: none;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            text-align: center;
            box-sizing: border-box;
            display: inline-block;
        }

        .custom-file-upload:hover, #resetBtn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .controls {
            border-radius: 4px;
            flex: 0 0 350px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            max-height: 100%;
        }

        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                padding: 10px;
                gap: 5px;
            }
            .canvas-container {
                width: 100%;
                flex: 1 1 0%; /* forces it to shrink infinitely if needed */
            }
            .controls {
                flex: 0 0 auto;
                padding: 10px;
                gap: 5px;
            }
            .control-group {
                gap: 10px;
            }
            #resetBtn {
                margin-top: 0;
            }
        }

        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .control-group label {
            flex: 1.2;
            font-size: 0.9em;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .control-group input[type="range"] {
            flex: 2;
            accent-color: #fff;
        }

        .control-group span {
            min-width: 44px;
            text-align: right;
            font-family: monospace;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        #resetBtn {
            margin-top: 8px;
        }

        #info {
            font-family: monospace;
            white-space: pre;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls">
            <div class="control-group" style="justify-content: space-between;">
                <span id="info">Loading...</span>
                <div style="display: flex; align-items: center; gap: 10px;">

                <label for="maxrpm">Max RPM</label>

                <button id="resetBtn" style="flex: 1; margin: 0;">Reset Spin</button>
            </div>
        </div>
    </div>
</body>




<script id="vertexShader" type="x-shader/x-vertex">
    attribute float a_VertexID; // Pass vertex indices manually as a float
    varying vec2 v_position;
    void main() {
        if(a_VertexID<=2.5)  gl_Position = vec4(-1,3,0,1);
        if(a_VertexID<=1.5)  gl_Position = vec4(3,-1,0,1);
        if(a_VertexID<=0.5)  gl_Position = vec4(-1,-1,0,1);
        v_position = gl_Position.xy * 0.5 + 0.5;
    }
</script>
<script id="fragmentShaderToPolar" type="x-shader/x-fragment">
    #define PI 3.1415926536
    precision mediump float;
    varying vec2 v_position;
    uniform vec2 u_texture_size;
    uniform vec2 u_canvas_size;
    uniform sampler2D u_texture;

    float srgb2linear(float c){
        // Simple
        // return pow(c, 2.2);
        // Rec. 709
        if(c<=0.04045) return c/12.92;
        return pow((c+0.055)/1.055, 2.4);
    }

    vec4 srgb2linear(vec4 c){
        return vec4(
            srgb2linear(c.r),
            srgb2linear(c.g),
            srgb2linear(c.b),
            c.a
        );
    }


    #define SAMPLES 4

    void main(void) {
        vec4 c = vec4(0);
        for(int i=0;i<SAMPLES;i++){
            float x = v_position.x + float(i)/float(SAMPLES)/u_canvas_size.x;
            vec2 polar = vec2(
                cos(x * 2.0 * PI),
                sin(x * 2.0 * PI)
            ) * (v_position.y * 0.5) * length(u_texture_size) / u_texture_size + 0.5;
            vec4 v = texture2D(u_texture, polar);
            c += srgb2linear(v) / float(SAMPLES);
        }
        gl_FragColor = c;
    }
</script>
<script id="fragmentShaderRender" type="x-shader/x-fragment">
    #define PI 3.1415926536
    precision mediump float;
    varying vec2 v_position;
    uniform sampler2D u_prefix0;
    uniform sampler2D u_prefix1;
    uniform sampler2D u_prefix2;
    uniform sampler2D u_texture;
    uniform vec2 u_buffer_size;
    uniform vec2 u_texture_size;
    uniform vec2 u_canvas_size;

    uniform float u_angle;
    uniform float u_shutter;
    uniform float u_rolling;

    float srgb2linear(float c){
        // Simple
        // return pow(c, 2.2);
        // Rec. 709
        if(c<=0.04045) return c/12.92;
        return pow((c+0.055)/1.055, 2.4);
    }

    vec4 srgb2linear(vec4 c){
        return vec4(
            srgb2linear(c.r),
            srgb2linear(c.g),
            srgb2linear(c.b),
            c.a
        );
    }

    float linear2srgb(float c){
        // return pow(c, 1.0/2.2);
        if(c<=0.0031308) return c*12.92;
        return 1.055*pow(c, 1.0/2.4) - 0.055;
    }

    vec4 linear2srgb(vec4 c){
        return vec4(
            linear2srgb(c.r),
            linear2srgb(c.g),
            linear2srgb(c.b),
            c.a
        );
    }


    vec4 integral2(float x1, float x2, float y, float norm){
        float halfx = 0.5/u_buffer_size.x;
        float halfy = 0.5/u_buffer_size.y;
        vec4 prefix0_1 = texture2D(u_prefix0, vec2(x1-halfx, y+halfy));
        vec4 prefix1_1 = texture2D(u_prefix1, vec2(x1-halfx, y+halfy));
        vec4 prefix2_1 = texture2D(u_prefix2, vec2(x1-halfx, y+halfy));

        float px1 = x1*u_buffer_size.x;
        if(px1<1.0){
            prefix0_1 *= px1;
            prefix1_1 *= px1;
            prefix2_1 *= px1;
        }

        vec4 prefix0_2 = texture2D(u_prefix0, vec2(x2-halfx, y+halfy));
        vec4 prefix1_2 = texture2D(u_prefix1, vec2(x2-halfx, y+halfy));
        vec4 prefix2_2 = texture2D(u_prefix2, vec2(x2-halfx, y+halfy));

        float px2 = x2*u_buffer_size.x;
        if(px2<1.0){
            prefix0_2 *= px2;
            prefix1_2 *= px2;
            prefix2_2 *= px2;
        }

        vec4 diff0 = vec4(prefix0_2 - prefix0_1);
        vec4 diff1 = vec4(prefix1_2 - prefix1_1);
        vec4 diff2 = vec4(prefix2_2 - prefix2_1);
        vec4 diff = (diff2*64.0 + diff1)*64.0+diff0;

        return diff / norm;

    }

    vec4 integral(vec2 p, float l){
        p.x = fract(p.x);
        float norm = l * u_buffer_size.x;
        vec4 accum = vec4(0);
       
        float laps = floor(l);
        float f = fract(l);
        float x0 = p.x-f;
        float fx0 = fract(x0);
        accum += integral2(fx0, p.x, p.y, norm);
        if(fx0>x0) laps+=1.0;
        accum += laps * integral2(0.0, 2.0, p.y, norm);
        return accum;
    }

    #define SAMPLES 4

    void main(void) {
        vec2 uv = (v_position - 0.5) / length(u_canvas_size) * u_canvas_size * 2.0;
        vec2 p = vec2(
            fract(atan(uv.y, uv.x)/PI*0.5 + u_angle + u_rolling * uv.y),
            length(uv)
        );

        // sampling without shutter when shutter is small.

        vec4 c0 = vec4(0);
        for(int i=0;i<SAMPLES;i++){
            float x = p.x + float(i)/float(SAMPLES) * u_shutter;
            vec2 polar = vec2(
                cos(x * 2.0 * PI),
                sin(x * 2.0 * PI)
            ) * (p.y * 0.5) * length(u_texture_size) / u_texture_size + 0.5;
            vec4 v = texture2D(u_texture, polar);
            c0 += srgb2linear(v) / float(SAMPLES);
        }

        // Debug: Red is blended with sampling.
        // c0.r=1.0;
        
        
        vec4 c = integral(p, max(u_shutter, 1.5/u_buffer_size.x));
        c = mix(c0, c, smoothstep(0.0, 1.0, u_buffer_size.x * u_shutter / 5.0 - 1.0));

        c = linear2srgb(c);

        gl_FragColor = vec4(c);

    }
</script>
<script>
    // ==========================================
    // === 1. STATE & DOM ELEMENTS
    // ==========================================
    const fileInput = document.getElementById('file')
    const canvas = document.getElementById('canvas')
    canvas.width = 512;
    canvas.height = 512;
    /**@type {WebGLRenderingContext}*/
    const gl = canvas.getContext('webgl')

    // Set Image and call main().
    let targetImg = document.createElement('img')
    targetImg.src = './sample.png'

    // Image file input.
    function fileToImage(file) {
        const img = new Image()
        img.src = URL.createObjectURL(file)
        return img
    }

    fileInput.addEventListener('change', function (e) {
        if (e.target.files) {
            targetImg = fileToImage(e.target.files[0])
            main()
        }
    })

    // ==========================================
    // === 2. WEBGL SETUP & UTILS
    // ==========================================
    async function imageReady(img) {
        if (img.complete) return img
        return new Promise(done => img.addEventListener('load', _ => done(img)))
    }

    function imageToTexture(img) {
        const texture = gl.createTexture()
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
        gl.pixelStorei(gl.UNPACK_COLORSPACE_CONVERSION_WEBGL, false);
        gl.bindTexture(gl.TEXTURE_2D, texture)
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE)
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE)
        return texture
    }

    // Shader helper functions.

    function loadShaderFromSource(type, source) {
        const shader = gl.createShader(type)
        gl.shaderSource(shader, source)
        gl.compileShader(shader)
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.log(gl.getShaderInfoLog(shader))
            gl.deleteShader(shader)
            return null
        }
        return shader
    }

    function loadShaderFromId(type, id) {
        const source = document.getElementById(id).textContent
        return loadShaderFromSource(type, source)
    }


    function createShaderProgram(vertId, fragId) {
        const program = gl.createProgram()
        gl.attachShader(program, loadShaderFromId(gl.VERTEX_SHADER, vertId))
        gl.attachShader(program, loadShaderFromId(gl.FRAGMENT_SHADER, fragId))
        gl.linkProgram(program)
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.log(gl.getProgramInfoLog(program))
            gl.deleteProgram(program)
            return null
        }
        return program
    }

    // Main.
    async function setupTargetTexture() {
        await imageReady(targetImg)
        const texture = imageToTexture(targetImg)
        const imageScale = 900 / Math.max(targetImg.naturalWidth, targetImg.naturalHeight)
        canvas.width = Math.round(targetImg.naturalWidth * imageScale)
        canvas.height = Math.round(targetImg.naturalHeight * imageScale)
        return texture
    }

    function bindIdBuffer(program) {
        // Bind Buffer.
        const idBuffer = gl.createBuffer()
        gl.bindBuffer(gl.ARRAY_BUFFER, idBuffer)
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0.0, 1.0, 2.0]), gl.STATIC_DRAW)
        const a_VertexID = gl.getAttribLocation(program, "a_VertexID")
        gl.enableVertexAttribArray(a_VertexID)
        gl.vertexAttribPointer(
            /*index=*/a_VertexID,  /*size=*/1, /*type=*/gl.FLOAT,
            /*normalized=*/false, /*stride=*/0, /*offset=*/0
        )
    }

    function bindFrameBuffer(bufferWidth, bufferHeight) {
        const fb = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fb); // Corrected target
        const offscreenTexture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, offscreenTexture);
        gl.texImage2D(
            gl.TEXTURE_2D, 0, gl.RGBA, bufferWidth, bufferHeight,
            0, gl.RGBA, gl.UNSIGNED_BYTE, null
        );
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.framebufferTexture2D(
            gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, offscreenTexture, 0
        );
        gl.bindTexture(gl.TEXTURE_2D, null);
    }

    function bindTexture(program, name, texture, i = 0) {
        gl.activeTexture(gl.TEXTURE0 + i)
        gl.bindTexture(gl.TEXTURE_2D, texture)
        const u_texture = gl.getUniformLocation(program, name)
        gl.uniform1i(u_texture, i)
    }


    function linear2srgb(c) {
        if (c <= 0.0031308) return c * 12.92;
        return 1.055 * Math.pow(c, 1.0 / 2.4) - 0.055;
    }


    // ==========================================
    // === 3. MAIN RENDER PIPELINE
    // ==========================================
    let u_angle, u_shutter, u_rolling;

    async function main() {
        const texture = await setupTargetTexture()

        const program = createShaderProgram('vertexShader', 'fragmentShaderToPolar')
        gl.useProgram(program)

        bindIdBuffer(program)

        const bufferWidth = 512 // Or whatever size > canvas you need!
        const bufferHeight = Math.ceil(Math.max(canvas.width, canvas.height))
        bindFrameBuffer(bufferWidth, bufferHeight)

        // Bind Texture.
        bindTexture(program, "u_texture", texture, 0)

        // Update uniform.
        gl.uniform2f(gl.getUniformLocation(program, "u_texture_size"),
            targetImg.naturalWidth, targetImg.naturalHeight)
        gl.uniform2f(gl.getUniformLocation(program, "u_canvas_size"),
            bufferWidth, bufferHeight)

        // Render.
        gl.viewport(0, 0, bufferWidth, bufferHeight);
        gl.clearColor(0.0, 0.0, 0.0, 0.0)
        gl.clearDepth(1.0)
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT)
        gl.drawArrays(gl.TRIANGLES, /*offset=*/0, /*vertexCount=*/3)


        // Get output.
        const rawOutputData = new Uint8Array(bufferWidth * bufferHeight * 4)
        gl.readPixels(0, 0, bufferWidth, bufferHeight, gl.RGBA, gl.UNSIGNED_BYTE, rawOutputData)
        console.log(rawOutputData)

        // Build prefix integration table
        const prefix0 = new Uint8Array(bufferWidth * bufferHeight * 4)
        const prefix1 = new Uint8Array(bufferWidth * bufferHeight * 4)
        const prefix2 = new Uint8Array(bufferWidth * bufferHeight * 4)
        for (let y = 0; y < bufferHeight; y++) {
            const prefixSum = new Int32Array(4);
            for (let x = 0; x < bufferWidth; x++) {
                for (let c = 0; c < 4; c++) {
                    const i = (x + y * bufferWidth) * 4
                    prefixSum[c] += rawOutputData[i + c];
                    prefix0[i + c] = (prefixSum[c] % 64)
                    prefix1[i + c] = ((prefixSum[c] >> 6) % 64)
                    prefix2[i + c] = ((prefixSum[c] >> 12) % 64)
                    // prefix2[i + c] = rawOutputData[i + c]
                }
            }

            if (y == bufferHeight - 1) {
                const r = Math.round(linear2srgb(prefixSum[0] / bufferWidth / 255) * 255)
                const g = Math.round(linear2srgb(prefixSum[1] / bufferWidth / 255) * 255)
                const b = Math.round(linear2srgb(prefixSum[2] / bufferWidth / 255) * 255)
                const a = prefixSum[3] / bufferWidth / 255
                document.body.style.backgroundColor = "rgba(" + r + "," + g + "," + b + "," + a + ")"
            }
        }

        // Extract 1D density profile for literal wavetable sonification
        const densityProfile = new Float32Array(bufferWidth);
        let minD = Infinity, maxD = -Infinity, sumD = 0;
        for (let x = 0; x < bufferWidth; x++) {
            // Integrate one slice to get the sum.
            let sum = 0;
            for (let y = 0; y < bufferHeight * 0.707; y++) {
                const i = (x + y * bufferWidth) * 4;
                const luma = rawOutputData[i] + rawOutputData[i + 1] + rawOutputData[i + 2];
                sum += luma * (y / bufferHeight); // Weight by radius
            }
            densityProfile[x] = sum;
            sumD += sum;
            if (sum < minD) minD = sum;
            if (sum > maxD) maxD = sum;
        }

        const meanD = sumD / bufferWidth;
        let peak = Math.max(Math.abs(maxD - meanD), Math.abs(minD - meanD)) || 1;
        globalWaveData = new Float32Array(bufferWidth);
        for (let x = 0; x < bufferWidth; x++) {
            globalWaveData[x] = (densityProfile[x] - meanD) / peak; // Normalize -1 to 1
        }
        if (typeof updateAudioBuffer === 'function') updateAudioBuffer();


        // Reset framebuffer.
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, canvas.width, canvas.height);

        // Stage two.
        const program2 = createShaderProgram('vertexShader', 'fragmentShaderRender')
        gl.useProgram(program2)

        // Create Textures
        const prefixTextures = [
            gl.createTexture(),
            gl.createTexture(),
            gl.createTexture(),
        ]

        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);

        for (let i = 0; i < 3; i++) {
            const prefixArray = [
                prefix0, prefix1, prefix2
            ][i]
            gl.activeTexture([gl.TEXTURE0, gl.TEXTURE1, gl.TEXTURE2][i])

            gl.bindTexture(gl.TEXTURE_2D, prefixTextures[i])
            gl.texImage2D(
                gl.TEXTURE_2D, 0, gl.RGBA, bufferWidth, bufferHeight,
                0, gl.RGBA, gl.UNSIGNED_BYTE, prefixArray
            )
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR)
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR)
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE)
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE)
        }


        // Bind Textures
        for (let i = 0; i < 3; i++) {
            bindTexture(program2, "u_prefix" + i, prefixTextures[i], i)
        }
        bindTexture(program2, "u_texture", texture, 3)

        // Update uniform.
        gl.uniform2f(gl.getUniformLocation(program2, "u_texture_size"),
            targetImg.naturalWidth, targetImg.naturalHeight)
        gl.uniform2f(gl.getUniformLocation(program2, "u_buffer_size"),
            bufferWidth, bufferHeight)
        gl.uniform2f(gl.getUniformLocation(program2, "u_canvas_size"),
            canvas.width, canvas.height)


        u_angle = gl.getUniformLocation(program2, "u_angle")
        u_shutter = gl.getUniformLocation(program2, "u_shutter")
        u_rolling = gl.getUniformLocation(program2, "u_rolling")

        angle = 0
        deltaAngle = 0.0
    }

    let angle = 0
    let deltaAngle = 0.0

    let prevTime = NaN

    // Parameter Elements
    const accelInput = document.getElementById('accel')
    const accelVal = document.getElementById('accel-val')
    const maxrpmInput = document.getElementById('maxrpm')
    const maxrpmVal = document.getElementById('maxrpm-val')
    const shutterMultInput = document.getElementById('shutterMult')
    const shutterMultVal = document.getElementById('shutterMult-val')
    const rollingMultInput = document.getElementById('rollingMult')
    const rollingMultVal = document.getElementById('rollingMult-val')
    const soundToggle = document.getElementById('soundToggle')
    const resetBtn = document.getElementById('resetBtn')
    const info = document.getElementById('info')

    // Parameters state
    let paramAccel = parseFloat(accelInput.value)
    let paramMaxrpm = Math.pow(parseFloat(maxrpmInput.value) / 100, 3) * 5000
    let paramShutterMult = parseFloat(shutterMultInput.value)
    let paramRollingMult = parseFloat(rollingMultInput.value)

    function updateParams() {
        paramAccel = parseFloat(accelInput.value)
        accelVal.textContent = paramAccel.toFixed(2)

        paramMaxrpm = Math.pow(parseFloat(maxrpmInput.value) / 100, 3) * 5000
        maxrpmVal.textContent = paramMaxrpm.toFixed(0)

        paramShutterMult = parseFloat(shutterMultInput.value)
        shutterMultVal.textContent = paramShutterMult.toFixed(2)

        paramRollingMult = parseFloat(rollingMultInput.value)
        rollingMultVal.textContent = paramRollingMult.toFixed(1)
    }

    accelInput.addEventListener('input', updateParams)
    maxrpmInput.addEventListener('input', updateParams)
    shutterMultInput.addEventListener('input', updateParams)
    rollingMultInput.addEventListener('input', updateParams)

    resetBtn.addEventListener('click', () => {
        angle = 0
        deltaAngle = 0.0
    })

    // ==========================================
    // === 4. AUDIO ENGINE
    // ==========================================
    let audioCtx = null;
    let mainOsc = null;
    let noiseSrc = null;
    let noiseFilter = null;
    let oscGain = null;
    let rattleFilter = null;
    let rattleGain = null;
    let noiseGain = null;
    let masterGain = null;
    let globalWaveData = null;

    function updateAudioBuffer() {
        if (!audioCtx || !globalWaveData) return;
        const buffer = audioCtx.createBuffer(1, globalWaveData.length, audioCtx.sampleRate);
        buffer.copyToChannel(globalWaveData, 0);

        const now = audioCtx.currentTime;

        if (mainOsc) {
            const oldOsc = mainOsc;
            const oldFade = mainOsc.fadeNode;
            if (oldFade) {
                oldFade.gain.cancelScheduledValues(now);
                oldFade.gain.setValueAtTime(oldFade.gain.value, now);
                oldFade.gain.linearRampToValueAtTime(0, now + 0.05);
                setTimeout(() => {
                    oldOsc.stop();
                    oldOsc.disconnect();
                    oldFade.disconnect();
                }, 100);
            } else {
                oldOsc.stop();
                oldOsc.disconnect();
            }
        }

        mainOsc = audioCtx.createBufferSource();
        mainOsc.buffer = buffer;
        mainOsc.loop = true;

        const fadeNode = audioCtx.createGain();
        fadeNode.gain.setValueAtTime(0, now);
        fadeNode.gain.linearRampToValueAtTime(1, now + 0.05);
        mainOsc.fadeNode = fadeNode;

        mainOsc.connect(fadeNode);
        fadeNode.connect(oscGain);
        fadeNode.connect(rattleFilter);

        let rpm = Math.abs(deltaAngle * 60);
        let baseFreq = Math.max(rpm / 60, 0.5);
        let rate = baseFreq * (globalWaveData.length / audioCtx.sampleRate);
        mainOsc.playbackRate.value = rate;

        mainOsc.start(now);
    }

    function initAudio() {
        if (audioCtx) return;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(audioCtx.destination);

        // Direct continuous hum path
        oscGain = audioCtx.createGain();
        oscGain.gain.value = 0.0;
        oscGain.connect(masterGain);

        // Mechanical Rattle Resonance Path
        rattleFilter = audioCtx.createBiquadFilter();
        rattleFilter.type = 'bandpass';
        rattleFilter.frequency.value = 250;
        rattleFilter.Q.value = 10.0;

        rattleGain = audioCtx.createGain();
        rattleGain.gain.value = 0.0;
        rattleFilter.connect(rattleGain);
        rattleGain.connect(masterGain);

        updateAudioBuffer();

        // Wind/Air Noise
        const bufferSize = audioCtx.sampleRate * 2;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

        noiseSrc = audioCtx.createBufferSource();
        noiseSrc.buffer = noiseBuffer;
        noiseSrc.loop = true;

        noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'lowpass';
        noiseFilter.frequency.value = 50;
        noiseFilter.Q.value = 1.0;

        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.0;

        noiseSrc.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(masterGain);
        noiseSrc.start();
    }

    function toggleAudio() {
        if (soundToggle.checked) {
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } else {
            if (masterGain) {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
        }
    }

    soundToggle.addEventListener('change', toggleAudio);

    // Handle browser autoplay policies by starting audio on first interaction
    const startAudioOnInteraction = () => {
        if (soundToggle.checked && !audioCtx) {
            toggleAudio();
        }
        if (audioCtx) {
            document.removeEventListener('pointerdown', startAudioOnInteraction);
            document.removeEventListener('keydown', startAudioOnInteraction);
        }
    };

    document.addEventListener('pointerdown', startAudioOnInteraction);
    document.addEventListener('keydown', startAudioOnInteraction);

    // ==========================================
    // === 5. ANIMATION LOOP
    // ==========================================
    function update() {
        setTimeout(update, 1000 / 60);
        // requestAnimationFrame(update)
        let time = Date.now()
        let deltaTime = (time - prevTime) / 1000
        prevTime = time
        if (!deltaTime) return


        // Set uniform.

        let maxrps = paramMaxrpm / 60

        if (deltaAngle > maxrps - 0.01) {
            deltaAngle += (maxrps - deltaAngle) * 0.6 * deltaTime
        }
        else if (deltaAngle < -maxrps + 0.01) {
            deltaAngle += (-maxrps - deltaAngle) * 0.6 * deltaTime
        } else {
            deltaAngle += paramAccel * deltaTime
        }


        let correctionAngle = (angle + 0.5) % 1 - 0.5

        deltaAngle += -correctionAngle * 0.1 * deltaTime

        let rpm = Math.abs(deltaAngle * 60);
        info.textContent = "RPM: " + (deltaAngle * 60).toFixed(0).padStart(5, " ")

        if (audioCtx && soundToggle.checked && mainOsc) {
            let baseFreq = Math.max(rpm / 60, 0.5);
            let rate = baseFreq * (globalWaveData.length / audioCtx.sampleRate);
            mainOsc.playbackRate.setTargetAtTime(rate, audioCtx.currentTime, 0.1);

            let filterFreq = Math.min(100 + rpm * 1.5, 10000);
            noiseFilter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.1);

            let rVol = Math.max(0, 1.0 - (rpm / 200)) * 0.4;
            let oscVol = Math.min(rpm / 200, 1.0) * 0.5;
            let noiseVol = Math.min(rpm / 1000, 1.0) * 0.3;

            rattleGain.gain.setTargetAtTime(rVol, audioCtx.currentTime, 0.1);
            oscGain.gain.setTargetAtTime(oscVol, audioCtx.currentTime, 0.1);
            noiseGain.gain.setTargetAtTime(noiseVol, audioCtx.currentTime, 0.1);

            let targetGain = Math.min(rpm / 1000, 1.0) * 0.3;
            if (rpm < 1) targetGain = 0;
            masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.1);
        }


        angle += deltaAngle * deltaTime

        let shutter = deltaAngle * deltaTime * paramShutterMult
        let rolling = -deltaAngle * deltaTime * paramRollingMult

        gl.uniform1f(u_angle, angle)
        gl.uniform1f(u_shutter, Math.abs(shutter))
        gl.uniform1f(u_rolling, rolling)

        // Render.
        gl.clearColor(0.0, 0.0, 0.0, 0.0)
        gl.clearDepth(1.0)
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT)
        gl.drawArrays(gl.TRIANGLES, /*offset=*/0, /*vertexCount=*/3)

    }


    main()

    update()




</script>
